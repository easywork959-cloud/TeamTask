// ============================================================
// CLOUD SYNC — Simple Multi-User (no login, polling-based)
// ============================================================
const SYNC_CONFIG_KEY = STORAGE_PREFIX + 'sync-config';
const POLL_INTERVAL_MS = 5000;  // pull from server every 5s when connected

function getSyncConfig() {
  try {
    const raw = localStorage.getItem(SYNC_CONFIG_KEY);
    return raw ? JSON.parse(raw) : { enabled: false, url: '', apiKey: '', userName: '', lastSyncAt: null };
  } catch { return { enabled: false, url: '', apiKey: '', userName: '', lastSyncAt: null }; }
}

function setSyncConfig(cfg) {
  localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(cfg));
}

async function apiCall(path, options = {}) {
  const cfg = getSyncConfig();
  if (!cfg.enabled || !cfg.url) throw new Error('Backend not configured');
  const url = cfg.url.replace(/\/$/, '') + path;
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (cfg.apiKey) headers['X-API-Key'] = cfg.apiKey;
  if (cfg.userName) headers['X-User-Name'] = cfg.userName;
  const response = await fetch(url, { ...options, headers });
  if (!response.ok) {
    let msg = `HTTP ${response.status}`;
    try { const err = await response.json(); msg = err.error || msg; } catch {}
    throw Object.assign(new Error(msg), { status: response.status });
  }
  return response.status === 204 ? null : await response.json();
}

async function testBackendConnection(url, apiKey) {
  const headers = {};
  if (apiKey) headers['X-API-Key'] = apiKey;
  const response = await fetch(url.replace(/\/$/, '') + '/api/health', { headers });
  if (!response.ok) {
    if (response.status === 401) throw new Error('Invalid API key');
    throw new Error(`HTTP ${response.status}`);
  }
  return await response.json();
}

async function connectBackend(url, apiKey, userName) {
  if (!url) { toast('Enter backend URL', 'danger'); return; }
  if (!userName || !userName.trim()) { toast('Enter your name (so teammates know who edited what)', 'danger'); return; }
  try {
    toast('Testing connection…');
    const health = await testBackendConnection(url, apiKey);
    setSyncConfig({ enabled: true, url, apiKey, userName: userName.trim(), lastSyncAt: new Date().toISOString() });
    // Initial pull to get any existing data from teammates
    await syncPull();
    startPolling();
    toast(`Connected as ${userName} ✓ ${health.counts ? `(${health.counts.tasks} tasks loaded)` : ''}`, 'success');
    render();
  } catch (e) {
    toast('Connection failed: ' + e.message, 'danger');
  }
}

async function disconnectBackend() {
  if (!confirm('Disconnect from cloud?\n\nLocal data is preserved.')) return;
  stopPolling();
  setSyncConfig({ enabled: false, url: '', apiKey: '', userName: '', lastSyncAt: null });
  toast('Disconnected');
  render();
}

// ---------- Polling for real-time-ish updates ----------
let _pollTimer = null;
let _polling = false;

function startPolling() {
  stopPolling();
  _pollTimer = setInterval(pollOnce, POLL_INTERVAL_MS);
  updateSyncIndicator(true);
}

function stopPolling() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  updateSyncIndicator(false);
}

async function pollOnce() {
  if (_polling) return;  // skip if previous poll still running
  _polling = true;
  try {
    const data = await apiCall('/api/data');
    // Compare with local data: if anything is different, merge non-locally-modified items
    let changed = false;
    ['team', 'projects', 'tasks'].forEach(col => {
      const remote = data[col] || [];
      const local = STATE[col] || [];
      // Build maps for diff
      const remoteMap = Object.fromEntries(remote.map(x => [x.id, x]));
      const localMap = Object.fromEntries(local.map(x => [x.id, x]));
      // Detect changes
      remote.forEach(rItem => {
        const lItem = localMap[rItem.id];
        const rUpdated = rItem._updated_at;
        const lUpdated = lItem?._updated_at;
        // If remote is newer, replace local
        if (!lItem || (rUpdated && rUpdated !== lUpdated)) {
          changed = true;
        }
      });
      // Detect deletions (in local but not remote)
      local.forEach(lItem => {
        if (!remoteMap[lItem.id]) changed = true;
      });
      if (changed) {
        // Strip server-only fields when storing locally
        STATE[col] = remote.map(stripServerFields);
      }
    });
    if (changed) {
      _suppressSync = true;
      await save('team');
      _suppressSync = true;
      await save('projects');
      _suppressSync = true;
      await save('tasks');
      // Show subtle toast indicating teammate update
      const recentEditors = new Set();
      ['team', 'projects', 'tasks'].forEach(col => {
        (data[col] || []).forEach(item => {
          if (item._updated_by && item._updated_by !== getSyncConfig().userName) {
            recentEditors.add(item._updated_by);
          }
        });
      });
      const cfg = getSyncConfig(); cfg.lastSyncAt = new Date().toISOString(); setSyncConfig(cfg);
      render();
    } else {
      const cfg = getSyncConfig(); cfg.lastSyncAt = new Date().toISOString(); setSyncConfig(cfg);
    }
    updateSyncIndicator(true);
  } catch (e) {
    console.warn('Poll failed:', e.message);
    updateSyncIndicator(false, e.message);
  } finally {
    _polling = false;
  }
}

function updateSyncIndicator(connected, error) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  if (connected) {
    el.textContent = '● Synced';
    el.style.color = 'var(--success)';
  } else {
    el.textContent = error ? '⚠ ' + error : '○ Offline';
    el.style.color = 'var(--danger)';
  }
}

function stripServerFields(item) {
  const o = { ...item };
  // Keep _updated_by and _updated_at for "Last edited by" UI hints
  // (frontend uses them but doesn't include them in writes — backend re-stamps anyway)
  return o;
}

// ---------- Manual pull/push ----------
async function syncPull() {
  try {
    const data = await apiCall('/api/data');
    if (data.team) STATE.team = data.team.map(stripServerFields);
    if (data.projects) STATE.projects = data.projects.map(stripServerFields);
    if (data.tasks) STATE.tasks = data.tasks.map(stripServerFields);
    _suppressSync = true; await save('team');
    _suppressSync = true; await save('projects');
    _suppressSync = true; await save('tasks');
    const cfg = getSyncConfig(); cfg.lastSyncAt = new Date().toISOString(); setSyncConfig(cfg);
    render();
    toast('Pulled latest from cloud ✓', 'success');
  } catch (e) {
    toast('Pull failed: ' + e.message, 'danger');
  }
}

async function syncPushAll() {
  if (!confirm('This will REPLACE all server data with your local copy. Are you sure?')) return;
  try {
    // Strip our server-side fields before pushing
    const cleanItems = (arr) => arr.map(item => {
      const o = { ...item }; delete o._updated_at; delete o._updated_by; return o;
    });
    await apiCall('/api/data', {
      method: 'PUT',
      body: JSON.stringify({
        team: cleanItems(STATE.team),
        projects: cleanItems(STATE.projects),
        tasks: cleanItems(STATE.tasks),
      }),
    });
    const cfg = getSyncConfig(); cfg.lastSyncAt = new Date().toISOString(); setSyncConfig(cfg);
    await syncPull();  // re-pull to get server timestamps
    toast('Pushed to cloud ✓', 'success');
  } catch (e) {
    toast('Push failed: ' + e.message, 'danger');
  }
}

// Per-item sync — called from CRUD operations
let _suppressSync = false;
async function syncSingleItem(collection, item, isDelete) {
  const cfg = getSyncConfig();
  if (!cfg.enabled || !cfg.url) return;
  if (_suppressSync) { _suppressSync = false; return; }

  try {
    if (isDelete) {
      await apiCall(`/api/${collection}/${item.id}`, { method: 'DELETE' });
    } else {
      // Strip server-side fields before sending
      const clean = { ...item };
      delete clean._updated_at; delete clean._updated_by;
      // Use POST (upsert) — works for both create and replace
      const result = await apiCall(`/api/${collection}`, {
        method: 'POST',
        body: JSON.stringify(clean),
      });
      // Sync server stamp back to local
      const local = STATE[collection].find(x => x.id === item.id);
      if (local && result._updated_at) {
        local._updated_at = result._updated_at;
        local._updated_by = result._updated_by;
      }
    }
    const cfg2 = getSyncConfig(); cfg2.lastSyncAt = new Date().toISOString(); setSyncConfig(cfg2);
  } catch (e) {
    console.warn('Sync failed for', collection, item.id, e.message);
    toast('Sync failed: ' + e.message + ' (saved locally)', 'danger');
  }
}

// Hooks called from save handlers — these don't block
async function syncItem(collection, item) {
  if (typeof syncSingleItem === 'function') await syncSingleItem(collection, item, false);
}
async function syncDelete(collection, item) {
  if (typeof syncSingleItem === 'function') await syncSingleItem(collection, item, true);
}

// ============================================================
// MULTI-SELECT DROPDOWN
// ============================================================
/* Renders a multi-select dropdown.
   id: unique DOM id (also used to look up state)
   label: display label when nothing selected (e.g., "All people")
   options: [{ value, label }]
   selected: array of currently selected values
   onChange: fn(newArray) called when selection changes — should mutate state and call render()
*/
function multiSelect({ id, label, options, selected, onChange }) {
  const sel = selected || [];
  const triggerLabel = sel.length === 0
    ? label
    : sel.length === 1
      ? (options.find(o => o.value === sel[0])?.label || label)
      : `${sel.length} selected`;
  const isActive = sel.length > 0;

  // Stash callback globally keyed by id (so inline onclick can look it up)
  window.__msHandlers = window.__msHandlers || {};
  window.__msHandlers[id] = { onChange, options };

  return `<div class="ms-wrap" id="ms-wrap-${id}">
    <button type="button" class="ms-trigger ${isActive ? 'active' : ''}" onclick="msToggle('${id}')" id="ms-trigger-${id}">
      <span class="ms-trigger-label">${escapeHtml(triggerLabel)}</span>
      ${sel.length > 1 ? `<span class="ms-count-badge">${sel.length}</span>` : ''}
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="ms-dropdown" id="ms-dropdown-${id}">
      ${options.length > 6 ? `<div class="ms-search"><input type="text" placeholder="Search…" oninput="msFilter('${id}', this.value)" /></div>` : ''}
      <div id="ms-options-${id}">
        ${options.map(o => `<label class="ms-option" data-label="${escapeHtml(o.label.toLowerCase())}">
          <input type="checkbox" value="${o.value}" ${sel.includes(o.value) ? 'checked' : ''} onchange="msUpdate('${id}', '${o.value}', this.checked)" />
          <span class="ms-option-label">${escapeHtml(o.label)}</span>
        </label>`).join('') || '<div class="ms-empty">No options</div>'}
      </div>
      <div class="ms-actions">
        <button type="button" onclick="msSelectAll('${id}')">Select all</button>
        <button type="button" onclick="msClear('${id}')">Clear</button>
      </div>
    </div>
  </div>`;
}

function msToggle(id) {
  const dropdown = document.getElementById(`ms-dropdown-${id}`);
  const trigger = document.getElementById(`ms-trigger-${id}`);
  if (!dropdown) return;
  const isOpen = dropdown.classList.toggle('open');
  trigger.classList.toggle('open', isOpen);
  // Close other open dropdowns
  document.querySelectorAll('.ms-dropdown.open').forEach(d => {
    if (d.id !== `ms-dropdown-${id}`) {
      d.classList.remove('open');
      const tid = d.id.replace('ms-dropdown-', '');
      const t = document.getElementById(`ms-trigger-${tid}`);
      if (t) t.classList.remove('open');
    }
  });
}

function msUpdate(id, value, checked) {
  const handler = window.__msHandlers?.[id];
  if (!handler) return;
  // Reconstruct full array from current checkbox states to keep in sync
  const checked_values = Array.from(
    document.querySelectorAll(`#ms-options-${id} input[type="checkbox"]`)
  ).filter(cb => cb.checked).map(cb => cb.value);
  handler.onChange(checked_values);
}

function msSelectAll(id) {
  const handler = window.__msHandlers?.[id];
  if (!handler) return;
  handler.onChange(handler.options.map(o => o.value));
}

function msClear(id) {
  const handler = window.__msHandlers?.[id];
  if (!handler) return;
  handler.onChange([]);
}

function msFilter(id, query) {
  const q = query.toLowerCase();
  document.querySelectorAll(`#ms-options-${id} .ms-option`).forEach(opt => {
    const label = opt.dataset.label || '';
    opt.style.display = label.includes(q) ? '' : 'none';
  });
}

// Close all multi-select dropdowns when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.ms-wrap')) {
    document.querySelectorAll('.ms-dropdown.open').forEach(d => {
      d.classList.remove('open');
      const tid = d.id.replace('ms-dropdown-', '');
      const t = document.getElementById(`ms-trigger-${tid}`);
      if (t) t.classList.remove('open');
    });
  }
});

            <select class="input" name="assignee" required>${STATE.team.map(u => `<option value="${u.id}" ${t.assignee === u.id ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('')}</select>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div>
            <label class="input-label">Status</label>
            <select class="input" name="status">${STATUS_OPTIONS.map(s => `<option value="${s}" ${t.status === s ? 'selected' : ''}>${s}</option>`).join('')}</select>
          </div>
          <div>
            <label class="input-label">Priority</label>
            <select class="input" name="priority">${PRIORITY_OPTIONS.map(s => `<option value="${s}" ${t.priority === s ? 'selected' : ''}>${s}</option>`).join('')}</select>
          </div>
          <div>
            <label class="input-label">Due Date</label>
            <input class="input" type="date" name="dueDate" value="${t.dueDate || ''}" />
          </div>
        </div>
        <div>
          <label class="input-label">Progress: <span id="prog-val" class="text-[var(--teal-deep)] font-bold">${t.progress}%</span></label>
          <input class="w-full" type="range" name="progress" min="0" max="100" step="5" value="${t.progress}" oninput="document.getElementById('prog-val').textContent=this.value+'%'" />
        </div>
        <div class="flex justify-end gap-2 pt-4 border-t border-[var(--border)]">
          <button type="button" onclick="closeModal()" class="btn btn-ghost">Cancel</button>
          <button type="submit" class="btn btn-primary">${taskId ? 'Save Changes' : 'Create Task'}</button>
        </div>
      </form>
    </div>
  `);
}

async function saveTask(e, taskId) {
  e.preventDefault();
  const f = new FormData(e.target);
  const data = { title:f.get('title'), description:f.get('description'), project:f.get('project'), assignee:f.get('assignee'), status:f.get('status'), priority:f.get('priority'), progress: parseInt(f.get('progress')), dueDate: f.get('dueDate'), updatedAt: new Date().toISOString().slice(0,10) };
  if (data.status === 'Done') data.progress = 100;
  let savedItem;
  if (taskId) savedItem = Object.assign(STATE.tasks.find(t => t.id === taskId), data);
  else { savedItem = { id: newId(), createdAt: new Date().toISOString().slice(0,10), ...data }; STATE.tasks.push(savedItem); }
  await save('tasks');
  await syncItem('tasks', savedItem);
  closeModal(); render(); toast(taskId ? 'Task updated' : 'Task created');
}

async function deleteTask(taskId) {
  if (!confirm('Delete this task?')) return;
  const removed = STATE.tasks.find(t => t.id === taskId);
  STATE.tasks = STATE.tasks.filter(t => t.id !== taskId);
  await save('tasks');
  if (removed) await syncDelete('tasks', removed);
  render(); toast('Task deleted');
}

function openProjectModal(pid) {
  const p = pid ? STATE.projects.find(x => x.id === pid) : { name:'', description:'', status:'Active', priority:'Medium', startDate:'', dueDate:'', owner: STATE.team[0]?.id || '' };
  if (!p) return;
  showModal(`
    <div class="p-7">
      <div class="flex items-start justify-between mb-5">
        <div>
          <div class="text-[10px] uppercase tracking-wider font-bold text-[var(--slate-light)]">${pid ? 'Edit Project' : 'New Project'}</div>
          <h2 class="font-display text-2xl font-extrabold">${pid ? 'Edit Project' : 'Create Project'}</h2>
        </div>
        <button onclick="closeModal()" class="text-2xl leading-none text-[var(--slate-light)] hover:text-[var(--slate)] w-8 h-8 rounded-full hover:bg-[var(--mint-bg)] flex items-center justify-center">×</button>
      </div>
      <form onsubmit="saveProject(event, '${pid || ''}')" class="space-y-4">
        <div><label class="input-label">Name <span class="text-[var(--danger)]">*</span></label><input class="input" name="name" value="${escapeHtml(p.name)}" required maxlength="80" /></div>
        <div><label class="input-label">Description</label><textarea class="input" name="description" rows="3">${escapeHtml(p.description || '')}</textarea></div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div><label class="input-label">Owner</label><select class="input" name="owner">${STATE.team.map(u => `<option value="${u.id}" ${p.owner === u.id ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('')}</select></div>
          <div><label class="input-label">Status</label><select class="input" name="status">${['Active','Planning','On Hold','Completed'].map(s => `<option value="${s}" ${p.status === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div><label class="input-label">Priority</label><select class="input" name="priority">${PRIORITY_OPTIONS.map(s => `<option value="${s}" ${p.priority === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div>
          <div><label class="input-label">Start Date</label><input class="input" type="date" name="startDate" value="${p.startDate || ''}" /></div>
          <div><label class="input-label">Due Date</label><input class="input" type="date" name="dueDate" value="${p.dueDate || ''}" /></div>
        </div>
        <div class="flex ${pid ? 'justify-between' : 'justify-end'} gap-2 pt-4 border-t border-[var(--border)]">
          ${pid ? `<button type="button" onclick="deleteProject('${pid}')" class="btn btn-ghost" style="color:var(--danger);border-color:var(--danger);">Delete</button>` : ''}
          <div class="flex gap-2"><button type="button" onclick="closeModal()" class="btn btn-ghost">Cancel</button><button type="submit" class="btn btn-primary">${pid ? 'Save' : 'Create'}</button></div>
        </div>
      </form>
    </div>
  `);
}

async function saveProject(e, pid) {
  e.preventDefault();
  const f = new FormData(e.target);
  const data = { name:f.get('name'), description:f.get('description'), status:f.get('status'), priority:f.get('priority'), startDate:f.get('startDate'), dueDate:f.get('dueDate'), owner:f.get('owner') };
  if (data.status === 'Completed') {
    data.archived = true;
    data.archivedAt = new Date().toISOString().slice(0, 10);
  }
  let savedItem;
  if (pid) savedItem = Object.assign(STATE.projects.find(p => p.id === pid), data);
  else { savedItem = { id: newId(), ...data }; STATE.projects.push(savedItem); }
  await save('projects');
  await syncItem('projects', savedItem);
  closeModal(); render();
  toast(data.archived ? 'Project completed & archived' : (pid ? 'Project updated' : 'Project created'));
}

async function deleteProject(pid) {
  const tasks = STATE.tasks.filter(t => t.project === pid).length;
  if (!confirm(`Delete this project${tasks ? ` and unassign ${tasks} task(s)?` : '?'}`)) return;
  const removed = STATE.projects.find(p => p.id === pid);
  STATE.projects = STATE.projects.filter(p => p.id !== pid);
  const reassigned = [];
  STATE.tasks.forEach(t => { if (t.project === pid) { t.project = STATE.projects[0]?.id || ''; reassigned.push(t); } });
  await save('projects'); await save('tasks');
  if (removed) await syncDelete('projects', removed);
  for (const t of reassigned) await syncItem('tasks', t);
  closeModal(); render(); toast('Project deleted');
}

async function saveMember(e, uid) {
  e.preventDefault();
  const f = new FormData(e.target);
  const data = { name:f.get('name'), role:f.get('role'), email:f.get('email'), color:f.get('color') };
  let savedItem;
  if (uid) savedItem = Object.assign(STATE.team.find(p => p.id === uid), data);
  else { savedItem = { id: newId(), joined: new Date().toISOString().slice(0,10), ...data }; STATE.team.push(savedItem); }
  await save('team');
  await syncItem('team', savedItem);
  closeModal(); render(); toast(uid ? 'Member updated' : 'Member added');
}

async function deleteMember(uid) {
  const tasks = STATE.tasks.filter(t => t.assignee === uid).length;
  if (!confirm(`Remove this member${tasks ? `? They have ${tasks} task(s) which will be unassigned.` : '?'}`)) return;
  const removed = STATE.team.find(u => u.id === uid);
  STATE.team = STATE.team.filter(u => u.id !== uid);
  const updTasks = [], updProjects = [];
  STATE.tasks.forEach(t => { if (t.assignee === uid) { t.assignee = STATE.team[0]?.id || ''; updTasks.push(t); } });
  STATE.projects.forEach(p => { if (p.owner === uid) { p.owner = STATE.team[0]?.id || ''; updProjects.push(p); } });
  await save('team'); await save('tasks'); await save('projects');
  if (removed) await syncDelete('team', removed);
  for (const t of updTasks) await syncItem('tasks', t);
  for (const p of updProjects) await syncItem('projects', p);
  render(); toast('Member removed');
}

// ---------- SEARCH ----------
let _searchDebounce = null;
function handleSearchInput(value) {
  clearTimeout(_searchDebounce);
  // Toggle clear button visibility immediately (no debounce)
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.style.display = value ? 'block' : 'none';
  _searchDebounce = setTimeout(() => {
    STATE.filters.search = value;
    render();
  }, 200);
}
function clearSearch() {
  const input = document.getElementById('search-input');
  if (input) input.value = '';
  STATE.filters.search = '';
  document.getElementById('search-clear').style.display = 'none';
  render();
}

// ---------- INIT ----------
async function init() {
  await loadAll();
  await autoArchiveCompleted();  // sweep: any Completed projects → ensure archived
  renderSidebar();
  render();
  // Auto-resume polling if previously connected
  const cfg = getSyncConfig();
  if (cfg.enabled && cfg.url) {
    // Initial pull + start polling
    syncPull().catch(()=>{}).finally(() => startPolling());
  }
  // Search — wired with debounce
  const searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', (e) => handleSearchInput(e.target.value));
  // Allow Esc inside search to clear it
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.target.value = '';
      handleSearchInput('');
      e.target.blur();
    }
  });
  // Cmd/Ctrl + K to focus search
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
  });
}
init();
</script>
