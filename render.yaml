services:
  - type: web
    name: team-ops-hub-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DATA_FILE
        value: "/var/data/data.json"
      # Uncomment + set a value below to require an API key:
      # - key: TEAM_OPS_API_KEY
      #   generateValue: true
    disk:
      name: team-ops-data
      mountPath: /var/data
      sizeGB: 1
